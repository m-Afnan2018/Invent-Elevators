<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adish Jain – Email Signature</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .signature-wrapper {
      background: #ffffff;
      width: 620px;
      border-radius: 2px;
      overflow: hidden;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    }

    /* ── TOP SECTION ── */
    .top-section {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 28px 32px 24px;
      border-bottom: 1.5px solid #e8e3d8;
    }

    .qr-block img {
      width: 100px;
      height: 100px;
      display: block;
      border: 1.5px solid #c8b97a;
      border-radius: 2px;
    }

    .info-block {
      flex: 1;
    }

    .person-name {
      font-size: 26px;
      font-weight: 700;
      color: #1e2a4a;
      letter-spacing: -0.3px;
      line-height: 1.1;
    }

    .person-title {
      font-size: 13px;
      font-weight: 400;
      color: #7a7a7a;
      margin-top: 4px;
      letter-spacing: 0.2px;
    }

    .divider-gold {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, #c8b97a 0%, #e8d9a0 50%, #c8b97a 100%);
      margin: 14px 0;
      opacity: 0.7;
    }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      text-decoration: none;
    }

    .contact-row:last-child {
      margin-bottom: 0;
    }

    .contact-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .contact-row span,
    .contact-row a {
      font-size: 13.5px;
      color: #2b3a8a;
      text-decoration: none;
      font-weight: 500;
    }

    .contact-row span:hover,
    .contact-row a:hover {
      text-decoration: underline;
    }

    /* ── BOTTOM SECTION ── */
    .bottom-section {
      display: flex;
      align-items: stretch;
      padding: 22px 32px;
      gap: 0;
      background: #fafaf8;
      border-bottom: 1.5px solid #e8e3d8;
    }

    .logo-col {
      display: flex;
      align-items: center;
      padding-right: 28px;
    }

    .logo-col img {
      width: 90px;
      display: block;
    }

    .company-contact-col {
      flex: 1;
      padding-right: 28px;
      border-right: 1.5px solid #d4cbb0;
    }

    .company-contact-col .contact-row {
      margin-bottom: 7px;
    }

    .office-col {
      flex: 1.1;
      padding-left: 28px;
    }

    .office-label {
      font-size: 13px;
      font-weight: 700;
      color: #1e2a4a;
      margin-bottom: 6px;
    }

    .office-label span {
      color: #c8b97a;
    }

    .office-address {
      font-size: 13px;
      color: #555;
      line-height: 1.65;
      font-weight: 400;
    }

    /* ── SOCIAL SECTION ── */
    .social-section {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 14px;
      padding: 14px 32px;
      background: #ffffff;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #f0ede6;
      transition: background 0.2s;
      text-decoration: none;
    }

    .social-link:hover {
      background: #e0d9c8;
    }

    .social-link svg {
      width: 15px;
      height: 15px;
      fill: #1e2a4a;
    }

    /* SVG icons inline */
  </style>
</head>
